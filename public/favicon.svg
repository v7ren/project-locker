<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 深色極簡背景 -->
  <rect width="512" height="512" rx="128" fill="#0A0A0C" />

  <!-- 主體圖形群組 (放大並置中) -->
  <g transform="translate(256, 276)">
    
    <!-- 底層節點 (Step 1) -->
    <rect x="-80" y="-80" width="160" height="160" rx="36" 
          transform="translate(0, 80) rotate(45)" 
          fill="#0A0A0C" stroke="#FFFFFF" stroke-width="24" stroke-opacity="0.2" />

    <!-- 中層節點 (Step 2) -->
    <rect x="-80" y="-80" width="160" height="160" rx="36" 
          transform="translate(0, 0) rotate(45)" 
          fill="#0A0A0C" stroke="#FFFFFF" stroke-width="24" stroke-opacity="0.5" />

    <!-- 頂層節點 (Step 3) -->
    <rect x="-80" y="-80" width="160" height="160" rx="36" 
          transform="translate(0, -80) rotate(45)" 
          fill="#0A0A0C" stroke="#FFFFFF" stroke-width="28" stroke-opacity="1" />
          
    <!-- 頂層核心點 -->
    <circle cx="0" cy="-80" r="24" fill="#FFFFFF" />
  </g>
</svg>